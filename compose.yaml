services:
  redis:
    image: redis:8-alpine
    command:
      - redis-server
      - --appendonly
      - 'yes'
      - --appendfsync
      - everysec
    ports:
      - '46379:6379'
    volumes:
      - droproom-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  droproom-redis-data:
