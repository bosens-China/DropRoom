name: droproom

services:
  web:
    image: boses/droproom-web:${DROPROOM_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - '${DROPROOM_WEB_BIND:-127.0.0.1}:${DROPROOM_WEB_PORT:-48080}:8080'
    depends_on:
      api:
        condition: service_healthy

  api:
    image: boses/droproom-api:${DROPROOM_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DROPROOM_CORS_ORIGINS: ${DROPROOM_CORS_ORIGINS:?请填写 HTTPS Web 来源}
      DROPROOM_REDIS_URL: redis://redis:6379
      DROPROOM_STORAGE_ROOT: /app/storage
      DROPROOM_ROOM_LIFETIME_MS: ${DROPROOM_ROOM_LIFETIME_MS:-86400000}
      DROPROOM_DISCONNECT_GRACE_MS: ${DROPROOM_DISCONNECT_GRACE_MS:-300000}
      DROPROOM_MAX_MEMBERS_PER_ROOM: ${DROPROOM_MAX_MEMBERS_PER_ROOM:-9}
      DROPROOM_MAX_TEXT_LENGTH: ${DROPROOM_MAX_TEXT_LENGTH:-20000}
      DROPROOM_MAX_FILES_PER_BATCH: ${DROPROOM_MAX_FILES_PER_BATCH:-50}
      DROPROOM_MAX_BATCH_BYTES: ${DROPROOM_MAX_BATCH_BYTES:-300000000}
      DROPROOM_MAX_ROOM_FILE_BYTES: ${DROPROOM_MAX_ROOM_FILE_BYTES:-1000000000}
      DROPROOM_GLOBAL_FILE_BYTES: ${DROPROOM_GLOBAL_FILE_BYTES:-30000000000}
      DROPROOM_LOG_LEVEL: ${DROPROOM_LOG_LEVEL:-info}
      DROPROOM_OPENAPI_ENABLED: ${DROPROOM_OPENAPI_ENABLED:-false}
    expose:
      - '43117'
    volumes:
      - droproom-api-storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - 'yes'
      - --appendfsync
      - everysec
    volumes:
      - droproom-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  droproom-api-storage:
  droproom-redis-data:
