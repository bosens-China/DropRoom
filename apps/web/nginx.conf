log_format droproom '$remote_addr - $remote_user [$time_local] '
  '"$request_method $uri $server_protocol" $status $body_bytes_sent '
  '"$http_referer" "$http_user_agent" request_id=$request_id';

server {
  listen 8080;
  server_name _;

  access_log /var/log/nginx/access.log droproom;

  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  client_max_body_size 3M;
  client_body_timeout 5m;
  send_timeout 1h;

  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    application/javascript
    application/json
    application/manifest+json
    application/wasm
    image/svg+xml
    text/css
    text/plain;

  location /assets/ {
    try_files $uri =404;
    expires 1y;
  }

  location = /index.html {
    expires -1;
  }

  location /api/ {
    proxy_pass http://api:43117/;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_connect_timeout 5s;
    proxy_read_timeout 24h;
    proxy_send_timeout 5m;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
